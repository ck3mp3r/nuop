pre-commit:
  parallel: true
  commands:
    nix-fmt:
      run: nix fmt .
      stage_fixed: true
    cargo-fmt:
      root: "operator/"
      run: cargo fmt --all
      stage_fixed: true
    check-merge-conflicts:
      run: git diff --check --cached
    end-of-file-fixer:
      glob: "*"
      run: |
        if [ -z "{staged_files}" ]; then
          exit 0
        fi
        for file in {staged_files}; do
          [ -z "$file" ] && continue
          if [ -s "$file" ] && [ -z "$(tail -c 1 "$file")" ]; then
            continue
          elif [ -s "$file" ]; then
            echo >> "$file"
            git add "$file"
          fi
        done
    trim-trailing-whitespace:
      glob: "*"
      run: |
        if [ -z "{staged_files}" ]; then
          exit 0
        fi
        for file in {staged_files}; do
          [ -z "$file" ] && continue
          sed -i '' -e 's/[[:space:]]*$//' "$file"
          git add "$file"
        done
